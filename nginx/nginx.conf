# ═══════════════════════════════════════════════════════════════
# Nginx Reverse Proxy for Ollama API — with API Key Auth
# ═══════════════════════════════════════════════════════════════
#
# Installation (Linux/Ubuntu server):
#   sudo cp nginx.conf /etc/nginx/sites-available/ollama-proxy
#   sudo ln -sf /etc/nginx/sites-available/ollama-proxy /etc/nginx/sites-enabled/
#
# Installation (macOS Homebrew):
#   cp nginx.conf /opt/homebrew/etc/nginx/servers/ollama-proxy.conf
#
# Then reload: sudo nginx -t && sudo systemctl reload nginx
#           or: nginx -t && nginx -s reload
#
# ── Auth methods ────────────────────────────────────────────
# Two methods are accepted (both validated against api-keys.conf):
#   1. X-Token: <key>               ← preferred, bypasses Cloudflare WAF
#   2. Authorization: Bearer <key>  ← for OpenAI-compatible clients (Obsidian, etc.)
#
# ── Why proxy_set_header Host "127.0.0.1"? ────────────────────
# Ollama rejects requests with external Host headers (e.g. ollama.kalix.vn).
# Overriding to 127.0.0.1 ensures Ollama accepts the proxied request.
# ═══════════════════════════════════════════════════════════════

# Rate limiting
limit_req_zone $binary_remote_addr zone=ollama_limit:10m rate=10r/s;

server {
    listen 8080;
    server_name _;

    # Max request body size (for large prompts)
    client_max_body_size 50m;

    # Timeouts for long-running inference requests
    proxy_read_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 600s;

    # ── Health check — no auth required ──
    location = /health {
        proxy_pass http://127.0.0.1:11434/;
        proxy_set_header Host "127.0.0.1";
    }

    # ── All API requests — auth required ──
    location / {
        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "X-Token, Authorization, Content-Type" always;
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        # Reject if no auth header provided (neither X-Token nor Authorization)
        if ($effective_token = "") {
            return 401 '{"error": "Missing API key. Use X-Token: <key> or Authorization: Bearer <key>"}';
        }

        # Reject if key not in allowed list
        if ($api_key_valid = 0) {
            return 403 '{"error": "Invalid API key"}';
        }

        # Rate limiting
        limit_req zone=ollama_limit burst=20 nodelay;

        # Proxy to Ollama
        # IMPORTANT: Set Host to 127.0.0.1 — Ollama rejects external hostnames
        proxy_pass http://127.0.0.1:11434;
        proxy_set_header Host "127.0.0.1";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming support
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "X-Token, Authorization, Content-Type" always;
    }
}

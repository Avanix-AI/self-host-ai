# ═══════════════════════════════════════════════════════════════
# Nginx Reverse Proxy for Ollama API — with API Key Auth
# ═══════════════════════════════════════════════════════════════
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/ollama-proxy
#   sudo cp api-keys.conf /etc/nginx/api-keys.conf
#   sudo ln -sf /etc/nginx/sites-available/ollama-proxy /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ═══════════════════════════════════════════════════════════════

# ── API Key validation map (must be in http context) ──
# If using sites-available, add this to /etc/nginx/conf.d/ollama-map.conf
# or include it in your main nginx.conf http {} block.
#
# map $http_authorization $api_key_valid {
#     default 0;
#     include /etc/nginx/api-keys.conf;
# }

# Rate limiting
limit_req_zone $binary_remote_addr zone=ollama_limit:10m rate=10r/s;

server {
    listen 8080;
    server_name _;

    # Max request body size (for large prompts)
    client_max_body_size 50m;

    # Timeouts for long-running inference requests
    proxy_read_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 600s;

    # Logging
    access_log /var/log/nginx/ollama-proxy-access.log;
    error_log  /var/log/nginx/ollama-proxy-error.log;

    # ── Health check — no auth ──
    location = /health {
        proxy_pass http://127.0.0.1:11434/;
        proxy_set_header Host $host;
    }

    # ── CORS preflight — no auth ──
    location @cors_preflight {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Max-Age 86400;
        return 204;
    }

    # ── All API requests ──
    location / {
        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        # Reject if no Authorization header
        if ($http_authorization = "") {
            return 401 '{"error": "Missing API key. Send header: Authorization: Bearer <your-key>"}';
        }

        # Reject if key not in allowed list
        if ($api_key_valid = 0) {
            return 403 '{"error": "Invalid API key"}';
        }

        # Rate limiting
        limit_req zone=ollama_limit burst=20 nodelay;

        # Proxy to Ollama
        proxy_pass http://127.0.0.1:11434;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming support
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }
}

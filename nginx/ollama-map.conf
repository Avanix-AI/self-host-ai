# ═══════════════════════════════════════════════════════════════
# Nginx map block for API Key validation
# ═══════════════════════════════════════════════════════════════
#
# MUST be placed in the http {} context of nginx.
#
# Linux:  /etc/nginx/conf.d/ollama-map.conf
#         (auto-included via: include /etc/nginx/conf.d/*.conf;)
#
# macOS:  Add map block directly inside http {} in:
#         /opt/homebrew/etc/nginx/nginx.conf
#
# ── Auth strategy ───────────────────────────────────────────────
# Supports two auth methods (both map to the same api-keys.conf):
#   1. X-Token: <key>              ← preferred (bypasses Cloudflare WAF)
#   2. Authorization: Bearer <key> ← for OpenAI-compatible clients (e.g. Obsidian)
#
# Cloudflare WAF may block "Authorization: Bearer sk-..." headers.
# If Cloudflare is in front, use X-Token from clients that support it.
# OpenAI-compatible clients (Obsidian plugin, etc.) can only send Bearer — allowed.
# ═══════════════════════════════════════════════════════════════

# Extract raw token from Authorization: Bearer <token>
map $http_authorization $bearer_token {
    default      "";
    "~^Bearer (.+)$" $1;
}

# Prefer X-Token; fall back to extracted Bearer token
map $http_x_token $effective_token {
    default $http_x_token;
    "" $bearer_token;
}

# Validate the effective token against api-keys.conf
map $effective_token $api_key_valid {
    default 0;
    include /etc/nginx/api-keys.conf;
}

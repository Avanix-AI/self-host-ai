# ═══════════════════════════════════════════════════════════════
# Nginx map block for API Key validation
# ═══════════════════════════════════════════════════════════════
#
# This MUST be placed in the http {} context of nginx.
# Place at: /etc/nginx/conf.d/ollama-map.conf
#
# It will be automatically included by nginx's default config
# which has: include /etc/nginx/conf.d/*.conf;
# ═══════════════════════════════════════════════════════════════

map $http_authorization $api_key_valid {
    default 0;
    include /etc/nginx/api-keys.conf;
}

# ═══════════════════════════════════════════════════════════════
# Ollama API Key Map Configuration
# ═══════════════════════════════════════════════════════════════
#
# This file is included by the map block in nginx http context.
# Place at: /etc/nginx/api-keys.conf
#
# Format: "Bearer <API_KEY>" 1;
#
# The map checks $http_authorization against these values.
# If matched, $api_key_valid = 1 (allowed).
# If not matched, $api_key_valid = 0 (denied, from map default).
#
# To generate a new key:
#   openssl rand -hex 32
#
# Then add it below as:
#   "Bearer <generated-key>" 1;
#
# ═══════════════════════════════════════════════════════════════

# ── Add your API keys below ──
# "Bearer sk-change-me-to-a-real-key-abc123" 1;
# "Bearer sk-another-user-key-def456" 1;

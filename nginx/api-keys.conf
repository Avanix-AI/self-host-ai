# ═══════════════════════════════════════════════════════════════
# Ollama API Key Map Configuration
# ═══════════════════════════════════════════════════════════════
#
# This file is included by the map block in nginx http context.
#
# Linux:  /etc/nginx/api-keys.conf
# macOS:  /opt/homebrew/etc/nginx/api-keys.conf
#
# ── Format ──────────────────────────────────────────────────────
# <raw_key> 1;
#
# Keys are stored as raw values (no "Bearer " prefix).
# The map in ollama-map.conf extracts the token from whichever
# header is used (X-Token or Authorization: Bearer) before lookup.
#
# ── Supported auth methods ──────────────────────────────────────
#   X-Token: <key>              ← preferred (bypasses Cloudflare WAF)
#   Authorization: Bearer <key> ← for OpenAI-compatible clients (Obsidian, etc.)
#
# ── To generate a new key ───────────────────────────────────────
#   openssl rand -hex 32 | sed 's/^/kalix-/'
#
# ── Why avoid "sk-" prefix? ─────────────────────────────────────
# Cloudflare WAF flags keys matching OpenAI's "sk-..." pattern
# as potential credential exposure and blocks them.
# Use a custom prefix like "kalix-" instead.
# ═══════════════════════════════════════════════════════════════

# ── Add your API keys below ──
# <your-generated-key> 1;
# <another-key> 1;
